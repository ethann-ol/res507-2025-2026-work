apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-app

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: quote-app

  template:
    metadata:
      labels:
        app: quote-app

    spec:
      containers:
        - name: quote-app
          image: quote-app:v2
          imagePullPolicy: Never

          ports:
            - containerPort: 3000

          env:
            - name: DATABASE_URL
              value: postgres://postgres:postgres@postgres:5432/postgres

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10